<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masar | مسار لدارك — AI Chatbot</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  {% include 'partials/head_favicon.html' %}
</head>
<body>

  {% include 'partials/nav_global.html' %}

  <div class="container chat-shell">
    <div class="chat-area" id="chat">
      <div class="bubble bot">
        Hi! Tell me what you want, like: <strong>“3 bedroom apartment in Abdoun under 200000”</strong>.
      </div>
    </div>

    <div class="chat-inputbar">
      <div class="chat-inputwrap">
        <input class="input" id="userInput" type="text"
               placeholder="Ask me about properties in Amman..." />
        <button class="chat-send" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script>
    async function sendMessage() {
      const input = document.getElementById("userInput");
      const chat = document.getElementById("chat");
      const message = input.value.trim();
      if (!message) return;

      chat.innerHTML += `<div class="bubble user">${escapeHtml(message)}</div>`;
      input.value = "";

      try {
        const response = await fetch("/api/chatbot", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message })
        });

        const data = await response.json();
        // Bot reply contains HTML (property cards, links) – render as HTML
        chat.innerHTML += `<div class="bubble bot">${data.reply || "Done."}</div>`;
      } catch (e) {
        chat.innerHTML += `<div class="bubble bot">Something went wrong. Try again.</div>`;
      }

      chat.scrollTop = chat.scrollHeight;
    }

    function escapeHtml(str){
      return str
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }
  </script>

</body>
</html>
